<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade 8 - Bandeiras com CSS</title>
    <link rel="stylesheet" href="bandeiras.css">
</head>
<body>
    <h1>Atividade Bandeiras com CSS</h1>

    <nav>
        <a href="#japao">Japão</a>
        <a href="#alemanha">Alemanha</a>
        <a href="#holanda">Holanda</a>
        <a href="#italia">Itália</a>
        <a href="#brasil">Brasil</a>
    </nav>

    <h2 id="japao">Japão</h2>
    <div id="japao" class="bandeira">
        <div class="circulo"></div>
    </div>

    <h2 id="alemanha">Alemanha</h2>
    <div id="alemanha" class="bandeira">
        <div class="faixa-vermelha"></div>
        <div class="faixa-amarela"></div>
    </div>

    <h2 id="holanda">Holanda</h2>
    <div id="holanda" class="bandeira">
        <div class="faixa-branca"></div>
        <div class="faixa-azul"></div>
    </div>

    <h2 id="italia">Itália</h2>
    <div id="italia" class="bandeira">
        <div class="faixa-branca"></div>
        <div class="faixa-vermelha"></div>
    </div>

    <h2 id="brasil">Brasil</h2>
    <div id="brasil" class="bandeira">
        <div class="losango"></div>
        <div class="circulo-azul"></div>
    </div>

</body>
</html>
