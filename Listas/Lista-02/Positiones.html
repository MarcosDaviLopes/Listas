<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Posiciona</title>
    <style>
        html{
            height: 200vh;
            position: relative;
        }
        #container{
            position: fixed;
            top: 50%;
            left: 50%;
            width: 500px;
            height: 500px;
            border: 10px solid black;
            transform:translate(-50%,-50%); 
        }
        .box{
            display: block;
            border: 1px  solid black;
            width: 100px;
            height: 100px;
            text-align: center;
            line-height: 100px;
        }
        #box1{
            left: 1px;
            top: 1px;
            position: absolute;
            background-color: cadetblue;
        }
        #box2{
            position: absolute;
            right: 1px;
            top: 1px;
            background-color: coral;
        }
        #box3{
            position: absolute;
            left: 1px;
            bottom: 1px;
            background-color: aqua;
        }
        #box4{
            position: absolute;
            right: 1px;
            bottom: 1px;
            background-color: red;
        }
        #box5{
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            background-color: green;
        }
    </style>
</head>
<body>
    
<div>
    <h1>position</h1>
</div>

<div id="container">
    <div id="box1" class="box">box 1</div>
    <div id="box2" class="box">box 2</div>
    <div id="box3" class="box">box 3</div>
    <div id="box4" class="box">box 4</div>
    <div id="box5" class="box" style="background-color: wheat;">box 5</div>
</div>



</body>
</html>
