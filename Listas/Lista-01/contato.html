    <h1>Contato</h1>
    <hr>
    <p>Preencha o formulário abaixo para entrar em contato. Os campos marcados são obrigatórios.</p>

    <p><a href="curriculo.html">← Voltar para o Currículo</a></p>

    <form>

        <label for="nome">Nome:</label><br>
        <input type="text" id="nome" placeholder="Digite seu nome" required><br><br>

        <label for="email">E-mail:</label><br>
        <input type="email" id="email" placeholder="Digite seu e-mail" required><br><br>

        <label for="assunto">Assunto:</label><br>
        <input type="text" id="assunto" placeholder="Digite o assunto"><br><br>

        <label for="estado">Estado:</label><br>
        <select id="estado">
            <option>Selecione um estado</option>
            <option>Santa Catarina</option>
            <option>Paraná</option>
            <option>Rio Grande do Sul</option>
            <option>São Paulo</option>
            <option>Rio de Janeiro</option>
            <option>Minas Gerais</option>
        </select><br><br>

        <label for="mensagem">Mensagem:</label><br>
        <textarea id="mensagem" rows="5" cols="40" placeholder="Digite sua mensagem"></textarea><br><br>

        <input type="submit" value="Enviar">
    </form>
</body>
