<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            background:#ececec;
            font-family:Arial;
        }

        .container{
            width:800px;
            height:600px;
            display:grid;
            grid-template-columns:1fr 1.5fr 1fr;
            grid-template-rows:100px 140px 140px 100px;
            grid-template-areas:
                "box1 box1 box1"
                "box2 box3 box4"
                "box5 box3 box6"
                "box5 box7 box7";

            gap:8px;

        }

        .box{
            display:flex;
            justify-content:center;
            align-items:center;
            font-size:32px;
            font-weight:bold;
            border-radius:8px;
        }

        #box-1{
            grid-area:box1;
            background:#116ed8;
        }

        #box-2{
            grid-area:box2;
            background:#b8b521;
        }

        #box-3{
            grid-area:box3;
            background:#6d10d6;
        }

        #box-4{
            grid-area:box4;
            background:#aa1437;
        }

        #box-5{
            grid-area:box5;
            background:#1512b1;
        }

        #box-6{
            grid-area:box6;
            background:#317068;
        }

        #box-7{
            grid-area:box7;
            background:#25af43;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box" id="box-1">1</div>
        <div class="box" id="box-2">2</div>
        <div class="box" id="box-3">3</div>
        <div class="box" id="box-4">4</div>
        <div class="box" id="box-5">5</div>
        <div class="box" id="box-6">6</div>
        <div class="box" id="box-7">7</div>
    </div>
</body>
</html>
